[workspace]
name = "pisco"
authors = ["Romain <romain.deffayet@naverlabs.com>"]
channels = ["conda-forge"]
platforms = ["linux-64"]
description = "PISCO/OSCAR Soft Compression Methods"
readme = "README.md"
version = "1.0.0"
requires-pixi = ">=0.64"

[system-requirements]
cuda = "12"

[activation.env]
CPATH="/usr/local/cuda/include"
CUDA_HOME="/usr/local/cuda"
CUDA_PATH="/usr/local/cuda"
TRITON_PTXAS_PATH="/usr/local/cuda/bin/ptxas"
TRITON_PTXAS_BLACKWELL_PATH="/usr/local/cuda/bin/ptxas"
TMPDIR="/tmp/$USER/$SLURM_JOB_ID"
TRITON_CACHE_DIR="/tmp/$USER/$SLURM_JOB_ID/triton/${SLURM_PROCID:-0}"

[dependencies]
python = ">=3.10,<3.14"
hydra-core = ">=1.3"
pytorch-gpu = ">=2.6"
cuda-version = "12.9.*"
transformers = ">=4"
datasets = ">=4"
peft = ">=0.15"
flash-attn = ">=2"
rouge = ">=1.0"
tensorboard = ">=2"

causal-conv1d = ">=1.6"

[pypi-dependencies]
pisco = {path = ".", editable = true}
flash-linear-attention = ">=0.4"

[tasks]
pretrain = "python pisco/train.py --config-name=pretraining"
finetune = "python pisco/train.py --config-name=finetune"
eval-qa = "python scripts/eval_agent_qa.py --checkpoint_path"

[feature.dev.dependencies]
ty = ">=0.0.23"
ruff = ">=0.15"

[environments]
default = { features = ["default"] }
dev = { features = ["dev"] }