[workspace]
name = "pisco"
authors = ["Romain <romain.deffayet@naverlabs.com>"]
channels = ["conda-forge"]
platforms = ["linux-64"]
description = "PISCO/OSCAR Soft Compression Methods"
readme = "README.md"
version = "1.0.0"
requires-pixi = ">=0.64"

[system-requirements]
cuda = "12"

[dependencies]
python = ">=3.10,<3.14"
hydra-core = ">=1.3"
pytorch-gpu = ">=2.6"
cuda-version = "12.9.*"
transformers = ">=4"
datasets = ">=4"
peft = ">=0.15"
flash-attn = ">=2"
rouge = ">=1.0"
tensorboard = ">=2"

[pypi-dependencies]
pisco = {path = ".", editable = true}

[feature.dev.dependencies]
ty = ">=0.0.23"
ruff = ">=0.15"

[environments]
default = { features = ["default"] }
dev = { features = ["dev"] }