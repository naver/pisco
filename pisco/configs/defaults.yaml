user_dir: ./outputs
model_class: pisco.model.PISCO  # pisco.model.PISCOPLE for Gemma4 PLE injection

hydra:
  job:
    chdir: true
    config:
      override_dirname:
        kv_sep: ":"
        item_sep: "--"
        exclude_keys:
          - exp_name
  run:
    dir: ${hydra:sweep.dir}
  sweep:
    dir: ${user_dir}/${exp_name}
    subdir: ${sanitize_override_dirname:${hydra.job.override_dirname}}
